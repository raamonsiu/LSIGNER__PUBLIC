name: lsigner-frontend-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lsigner-frontend-dev
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CI: 'true'
      PLAYWRIGHT_DOCKER: 'true'
      PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
    ports:
      - '3001:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm ci && rm -f .next/dev/lock && npx next dev -p 3000"

volumes:
  app_node_modules:

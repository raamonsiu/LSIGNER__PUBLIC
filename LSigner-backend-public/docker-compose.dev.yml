name: lsigner-dev

services:
  db:
    image: postgres:16-alpine
    container_name: lsigner-db-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lsb_dev_local}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:20-alpine
    container_name: lsigner-app-dev
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      DB_HOST: db
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run migration:run && npm run start:dev"

volumes:
  postgres_data_dev:
  app_node_modules: